spring.application.name=academconnect
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/academconnect}
spring.datasource.username=${DB_USER:academconnect}
spring.datasource.password=${DB_PASSWORD:academconnect}

spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=1MB

academconnect.storage.root=${STORAGE_ROOT:./data/documents}
academconnect.storage.avatars=${STORAGE_AVATARS_ROOT:./data/avatars}
academconnect.storage.avatars-public-prefix=/storage/avatars
academconnect.storage.avatars-max-bytes=${AVATARS_MAX_BYTES:2097152}

academconnect.security.jwt.secret=${JWT_SECRET:dev-secret-academconnect-needs-32-chars!}
academconnect.security.jwt.expiration-seconds=${JWT_EXPIRATION:86400}

academconnect.security.cookie.secure=${COOKIE_SECURE:true}
academconnect.security.cookie.same-site=${COOKIE_SAME_SITE:Strict}
academconnect.security.cookie.remember-days=${COOKIE_REMEMBER_DAYS:14}

academconnect.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Onboarding
academconnect.onboarding.token-ttl-horas=${ONBOARDING_TOKEN_TTL_HORAS:48}
academconnect.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}

# Mail (en dev usar Mailpit/maildev en localhost:1025)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
academconnect.mail.from=${MAIL_FROM:no-reply@academconnect.local}
academconnect.mail.lote-size=${MAIL_LOTE_SIZE:25}
academconnect.mail.drain-fixed-delay-ms=${MAIL_DRAIN_DELAY_MS:30000}
